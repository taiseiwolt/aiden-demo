<!DOCTYPE html>
<html lang="ja" id="html-root">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>モバイルオーダー | 炭火亭</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&family=Cormorant+Garamond:wght@400;600&display=swap" rel="stylesheet">
<style>
:root {
  --brand:#D32F2F; --brand-dark:#B71C1C; --brand-dim:rgba(211,47,47,.08);
  --bg:#f5f5f5; --surface:#fff; --text:#1a1a1a; --text2:#666; --text3:#999;
  --border:#e8e8e8; --green:#27ae60; --shadow:0 2px 12px rgba(0,0,0,.08);
  --shadow-lg:0 8px 32px rgba(0,0,0,.15); --r:12px; --r-sm:8px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%}
body{font-family:'Noto Sans JP',sans-serif;background:var(--bg);color:var(--text);font-size:14px;line-height:1.5;max-width:480px;margin:0 auto}
button{cursor:pointer;font-family:'Noto Sans JP',sans-serif}
.screen{display:none;min-height:100vh;flex-direction:column}
.screen.active{display:flex}

/* HEADER */
.app-header{background:var(--brand);color:white;padding:14px 16px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50;gap:8px}
.app-header-title{font-size:16px;font-weight:700;letter-spacing:.05em;flex:1;text-align:center}
.app-header-back{background:none;border:none;color:white;font-size:22px;padding:4px;line-height:1;width:40px;flex-shrink:0}
.app-header-cart{position:relative;background:none;border:none;color:white;font-size:22px;width:40px;flex-shrink:0;display:flex;align-items:center;justify-content:flex-end}
.cart-badge{position:absolute;top:-4px;right:-4px;background:#f39c12;color:white;font-size:10px;font-weight:700;width:16px;height:16px;border-radius:50%;display:flex;align-items:center;justify-content:center}

/* lang switcher in header */
.lang-mini{appearance:none;-webkit-appearance:none;background:rgba(255,255,255,.2);border:1px solid rgba(255,255,255,.4);color:white;font-size:10px;padding:3px 18px 3px 6px;border-radius:3px;cursor:pointer;font-family:'Noto Sans JP',sans-serif;outline:none;flex-shrink:0}
.lang-mini option{background:#333;color:#fff}
.lang-mini-wrap{position:relative;flex-shrink:0}
.lang-mini-wrap::after{content:'▾';position:absolute;right:4px;top:50%;transform:translateY(-50%);pointer-events:none;color:white;font-size:9px}

/* SCREEN 1: 店舗選択 */
.map-screen-body{flex:1;display:flex;flex-direction:column}
.order-type-select{display:grid;grid-template-columns:1fr 1fr;border-bottom:1px solid var(--border)}
.order-type-btn{padding:14px;text-align:center;cursor:pointer;font-size:14px;font-weight:600;border-bottom:3px solid transparent;color:var(--text2);transition:all .2s;background:white;border-top:none;border-left:none;border-right:none}
.order-type-btn.active{color:var(--brand);border-bottom-color:var(--brand)}
.map-placeholder{height:240px;background:linear-gradient(135deg,#e8f4e8,#d4e8d4);display:flex;align-items:center;justify-content:center;font-size:48px;position:relative;overflow:hidden}
.map-location-pin{position:absolute;top:50%;left:50%;transform:translate(-50%,-100%);font-size:32px;animation:pinBounce 1s ease-in-out infinite}
@keyframes pinBounce{0%,100%{transform:translate(-50%,-100%)}50%{transform:translate(-50%,-110%)}}
.stores-list-wrap{flex:1;overflow-y:auto;padding:12px}
.stores-list-title{font-size:12px;color:var(--text2);padding:8px 4px;letter-spacing:.05em;font-weight:500}
.store-card{background:white;border-radius:var(--r);padding:16px;margin-bottom:10px;box-shadow:var(--shadow);display:flex;gap:14px;cursor:pointer;transition:all .15s;border:2px solid transparent}
.store-card:active{transform:scale(.98)}
.store-card.selected{border-color:var(--brand)}
.store-card-icon{width:56px;height:56px;border-radius:10px;background:var(--brand);display:flex;align-items:center;justify-content:center;font-size:24px;flex-shrink:0}
.store-card-info{flex:1}
.store-card-name{font-weight:700;font-size:15px;margin-bottom:3px}
.store-card-address{font-size:12px;color:var(--text2);margin-bottom:6px}
.store-card-meta{display:flex;gap:10px;flex-wrap:wrap}
.store-card-distance{font-size:12px;color:var(--brand);font-weight:600}
.store-card-status{font-size:11px;padding:2px 8px;border-radius:20px;font-weight:600}
.store-card-status.open{background:rgba(39,174,96,.1);color:var(--green)}
.store-card-status.paused{background:rgba(211,47,47,.1);color:var(--brand)}
.select-store-btn{width:calc(100% - 24px);margin:0 12px 16px;padding:14px;background:var(--brand);color:white;border:none;border-radius:var(--r);font-size:15px;font-weight:700;letter-spacing:.05em;transition:background .2s}
.select-store-btn:disabled{background:var(--text3)}

/* SCREEN 2: メニュー */
.menu-screen-body{flex:1;display:flex;flex-direction:column;overflow:hidden}
.category-tabs{display:flex;overflow-x:auto;padding:0 12px;gap:6px;background:white;border-bottom:1px solid var(--border);-webkit-overflow-scrolling:touch}
.category-tabs::-webkit-scrollbar{display:none}
.cat-tab{padding:12px 16px;white-space:nowrap;font-size:13px;font-weight:600;cursor:pointer;color:var(--text2);border-bottom:2px solid transparent;background:none;border-top:none;border-left:none;border-right:none;flex-shrink:0}
.cat-tab.active{color:var(--brand);border-bottom-color:var(--brand)}
.menu-list{flex:1;overflow-y:auto;padding:12px;-webkit-overflow-scrolling:touch}
.menu-item{background:white;border-radius:var(--r);margin-bottom:10px;overflow:hidden;box-shadow:var(--shadow);display:flex;cursor:pointer;transition:all .15s;position:relative}
.menu-item:active{transform:scale(.99)}
.menu-item.sold-out{opacity:.5;pointer-events:none}
.menu-item-img{width:100px;height:100px;background:linear-gradient(135deg,#2d1f0a,#8b6914);display:flex;align-items:center;justify-content:center;font-size:36px;flex-shrink:0}
.menu-item-body{flex:1;padding:12px 12px 12px 14px}
.menu-item-name{font-weight:700;font-size:14px;margin-bottom:3px}
.menu-item-desc{font-size:11px;color:var(--text2);line-height:1.5;margin-bottom:8px}
.menu-item-footer{display:flex;align-items:center;justify-content:space-between}
.menu-item-price{font-weight:700;font-size:16px;color:var(--brand)}
.menu-item-price .unit{font-size:11px;font-weight:400;color:var(--text3)}
.menu-item-price .orig{font-size:11px;font-weight:400;color:var(--text3);text-decoration:line-through;margin-right:4px}
.add-btn{width:32px;height:32px;border-radius:50%;background:var(--brand);color:white;border:none;font-size:20px;display:flex;align-items:center;justify-content:center}
.sold-out-badge{position:absolute;top:8px;left:8px;background:rgba(0,0,0,.7);color:white;font-size:10px;font-weight:700;padding:2px 8px;border-radius:4px}
.cart-bottom{padding:12px;background:white;border-top:1px solid var(--border);position:sticky;bottom:0}
.cart-bottom-btn{width:100%;padding:14px;background:var(--brand);color:white;border:none;border-radius:var(--r);font-size:15px;font-weight:700;display:flex;align-items:center;justify-content:space-between}
.cart-bottom-btn:disabled{background:var(--text3)}
.cart-count-badge{background:rgba(255,255,255,.3);padding:2px 8px;border-radius:10px;font-size:13px}

/* OPTION MODAL */
.option-modal{position:fixed;inset:0;z-index:200;display:none;flex-direction:column}
.option-modal.open{display:flex}
.option-overlay{position:absolute;inset:0;background:rgba(0,0,0,.6)}
.option-sheet{position:relative;margin-top:auto;background:white;border-radius:20px 20px 0 0;max-height:85vh;overflow-y:auto;-webkit-overflow-scrolling:touch}
.option-sheet-handle{width:40px;height:4px;background:var(--border);border-radius:2px;margin:12px auto}
.option-sheet-img{height:180px;background:linear-gradient(135deg,#2d1f0a,#8b6914);display:flex;align-items:center;justify-content:center;font-size:64px}
.option-sheet-body{padding:20px}
.option-sheet-name{font-size:20px;font-weight:700;margin-bottom:4px}
.option-sheet-desc{font-size:13px;color:var(--text2);line-height:1.7;margin-bottom:8px}
.option-sheet-price{font-size:22px;font-weight:700;color:var(--brand);margin-bottom:20px}
.option-group{margin-bottom:20px;border:1px solid var(--border);border-radius:var(--r);overflow:hidden}
.option-group-header{padding:12px 16px;background:#f9f9f9;border-bottom:1px solid var(--border)}
.option-group-title{font-weight:700;font-size:14px}
.option-group-sub{font-size:11px;color:var(--text2);margin-top:2px}
.req-badge{background:var(--brand);color:white;padding:1px 6px;border-radius:4px;font-size:10px;margin-right:4px}
.opt-badge{background:var(--green);color:white;padding:1px 6px;border-radius:4px;font-size:10px;margin-right:4px}
.option-item{display:flex;align-items:center;padding:12px 16px;border-bottom:1px solid var(--border);cursor:pointer;transition:background .1s}
.option-item:last-child{border-bottom:none}
.option-item:active{background:var(--bg)}
.option-item-control{width:22px;height:22px;border-radius:50%;border:2px solid var(--border);margin-right:12px;flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all .15s}
.option-item.checkbox .option-item-control{border-radius:4px}
.option-item.selected .option-item-control{background:var(--brand);border-color:var(--brand)}
.option-item.selected .option-item-control::after{content:'✓';color:white;font-size:12px;font-weight:700}
.option-item-name{flex:1;font-size:14px}
.option-item-price{font-size:13px;color:var(--brand);font-weight:600}
.option-item-price.free{color:var(--text3)}
.option-item-counter{display:flex;align-items:center;gap:10px}
.counter-btn{width:28px;height:28px;border-radius:50%;border:1.5px solid var(--border);background:none;font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--text2)}
.counter-btn.active{border-color:var(--brand);color:var(--brand)}
.counter-val{font-size:15px;font-weight:700;min-width:20px;text-align:center}
.counter-limit{font-size:11px;color:var(--text3);text-align:center;margin-top:4px}
.qty-selector{display:flex;align-items:center;gap:14px;padding:16px 0;border-top:1px solid var(--border);margin-top:8px}
.qty-selector-label{font-size:14px;font-weight:600}
.qty-btn{width:36px;height:36px;border-radius:50%;border:2px solid var(--border);background:none;font-size:20px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.qty-btn.active{border-color:var(--brand);color:var(--brand)}
.qty-val{font-size:20px;font-weight:700;min-width:28px;text-align:center}
.add-to-cart-btn{width:100%;padding:15px;background:var(--brand);color:white;border:none;border-radius:var(--r);font-size:15px;font-weight:700;margin-top:16px;display:flex;align-items:center;justify-content:space-between}
.add-to-cart-btn:disabled{background:var(--text3)}

/* RECOMMEND */
.recommend-screen-body{flex:1;overflow-y:auto;padding:16px}
.recommend-title{font-size:18px;font-weight:700;text-align:center;margin-bottom:6px}
.recommend-sub{font-size:13px;color:var(--text2);text-align:center;margin-bottom:20px}
.recommend-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px}
.recommend-card{background:white;border-radius:var(--r);overflow:hidden;box-shadow:var(--shadow);cursor:pointer;transition:all .15s}
.recommend-card:active{transform:scale(.97)}
.recommend-card-img{height:100px;background:linear-gradient(135deg,#2d1f0a,#8b6914);display:flex;align-items:center;justify-content:center;font-size:36px}
.recommend-card-body{padding:10px}
.recommend-card-name{font-weight:700;font-size:13px;margin-bottom:4px}
.recommend-card-price{font-size:14px;font-weight:700;color:var(--brand)}
.recommend-add-btn{width:100%;padding:7px;background:var(--brand);color:white;border:none;border-radius:6px;font-size:12px;font-weight:700;margin-top:6px}
.skip-btn{width:100%;padding:13px;background:none;border:2px solid var(--border);border-radius:var(--r);font-size:14px;font-weight:600;color:var(--text2)}

/* CHECKOUT */
.checkout-body{flex:1;overflow-y:auto;padding:16px;padding-bottom:100px}
.checkout-section{background:white;border-radius:var(--r);padding:16px;margin-bottom:12px;box-shadow:var(--shadow)}
.checkout-section-title{font-size:14px;font-weight:700;margin-bottom:14px;padding-bottom:10px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:6px}
.checkout-row{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid var(--border);font-size:14px}
.checkout-row:last-child{border-bottom:none}
.checkout-row-label{color:var(--text2)}
.checkout-total-row{display:flex;justify-content:space-between;align-items:center;padding:12px 0;border-top:2px solid var(--text);margin-top:4px}
.checkout-total-label{font-size:16px;font-weight:700}
.checkout-total-price{font-size:22px;font-weight:700;color:var(--brand)}
.checkout-discount{font-size:13px;color:var(--green);display:flex;justify-content:space-between;padding:6px 0}
.type-toggle{display:grid;grid-template-columns:1fr 1fr;gap:6px}
.type-btn{padding:10px;text-align:center;border:2px solid var(--border);border-radius:var(--r-sm);cursor:pointer;font-size:13px;font-weight:600;transition:all .15s;background:none;color:var(--text2)}
.type-btn.selected{border-color:var(--brand);background:var(--brand-dim);color:var(--brand)}
.field-input{width:100%;padding:10px 12px;border:1.5px solid var(--border);border-radius:var(--r-sm);font-family:'Noto Sans JP',sans-serif;font-size:14px;color:var(--text);outline:none;transition:border-color .15s;background:var(--bg)}
.field-input:focus{border-color:var(--brand);background:white}
.field-label{font-size:12px;color:var(--text2);font-weight:600;margin-bottom:6px;letter-spacing:.05em;display:flex;justify-content:space-between}
.payment-option{display:flex;align-items:center;padding:12px;border:2px solid var(--border);border-radius:var(--r-sm);cursor:pointer;margin-bottom:8px;transition:all .15s;gap:12px}
.payment-option.selected{border-color:var(--brand);background:var(--brand-dim)}
.payment-option-icon{font-size:24px}
.payment-option-name{font-size:14px;font-weight:600}
.coupon-row{display:flex;gap:8px}
.coupon-input{flex:1;padding:10px 12px;border:1.5px solid var(--border);border-radius:var(--r-sm);font-family:'Noto Sans JP',sans-serif;font-size:14px;outline:none}
.coupon-btn{padding:10px 16px;background:var(--brand);color:white;border:none;border-radius:var(--r-sm);font-size:13px;font-weight:600;white-space:nowrap}
.order-item-row{display:flex;justify-content:space-between;align-items:flex-start;padding:8px 0;border-bottom:1px solid var(--border);font-size:13px;gap:8px}
.order-item-row:last-child{border-bottom:none}
.order-item-name{flex:1;font-weight:500}
.order-item-qty{color:var(--text2);white-space:nowrap}
.order-item-subtotal{font-weight:600;white-space:nowrap}
.checkout-submit{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;padding:12px;background:white;border-top:1px solid var(--border)}
.checkout-submit-btn{width:100%;padding:15px;background:var(--brand);color:white;border:none;border-radius:var(--r);font-size:16px;font-weight:700;display:flex;align-items:center;justify-content:center;gap:8px}
.checkout-submit-btn:disabled{background:var(--text3)}

/* COMPLETE */
.complete-body{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:32px 16px;text-align:center}
.complete-icon{font-size:72px;margin-bottom:20px;animation:scaleIn .5s cubic-bezier(.175,.885,.32,1.275)}
@keyframes scaleIn{0%{transform:scale(0)}100%{transform:scale(1)}}
.complete-number{font-size:72px;font-weight:700;color:var(--brand);font-family:'Cormorant Garamond',serif;line-height:1;margin:16px 0 8px}
.complete-number-label{font-size:12px;color:var(--text2);letter-spacing:.15em}
.complete-title{font-size:20px;font-weight:700;margin:20px 0 8px}
.complete-sub{font-size:14px;color:var(--text2);line-height:1.8}
.complete-wait{background:var(--brand-dim);border:1px solid rgba(211,47,47,.2);border-radius:var(--r);padding:16px;margin:20px 0;width:100%}
.complete-wait-time{font-size:32px;font-weight:700;color:var(--brand);font-family:'Cormorant Garamond',serif}
.complete-wait-label{font-size:12px;color:var(--text2)}
.home-btn{width:100%;padding:14px;background:var(--brand);color:white;border:none;border-radius:var(--r);font-size:15px;font-weight:700;margin-top:24px}

/* TOAST */
.toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%) translateY(100px);background:#333;color:white;padding:10px 20px;border-radius:20px;font-size:13px;font-weight:500;z-index:500;transition:transform .3s;white-space:nowrap}
.toast.show{transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>

<!-- ===== SCREEN 1: 店舗選択 ===== -->
<div class="screen active" id="screen-map">
  <div class="app-header">
    <span style="width:40px"></span>
    <span class="app-header-title" data-i18n="header_order">モバイルオーダー</span>
    <div class="lang-mini-wrap">
      <select class="lang-mini" onchange="changeLang(this.value)">
        <option value="ja">JP</option><option value="en">EN</option><option value="zh">中</option>
        <option value="ko">한</option><option value="fr">FR</option><option value="it">IT</option><option value="id">ID</option>
      </select>
    </div>
  </div>
  <div class="map-screen-body">
    <div class="order-type-select">
      <button class="order-type-btn active" id="btn-takeout" onclick="setOrderType('takeout')" data-i18n="tab_takeout">🥡 テイクアウト</button>
      <button class="order-type-btn" id="btn-delivery" onclick="setOrderType('delivery')" data-i18n="tab_delivery">🛵 デリバリー</button>
    </div>
    <div class="map-placeholder"><div class="map-location-pin">📍</div></div>
    <div class="stores-list-wrap">
      <div class="stores-list-title" data-i18n="nearby_stores">📍 近くの店舗</div>
      <div id="stores-list"></div>
    </div>
    <button class="select-store-btn" id="select-store-btn" onclick="goToMenu()" disabled data-i18n="btn_select_store">この店舗で注文する →</button>
  </div>
</div>

<!-- ===== SCREEN 2: メニュー ===== -->
<div class="screen" id="screen-menu">
  <div class="app-header">
    <button class="app-header-back" onclick="goScreen('screen-map')">←</button>
    <span class="app-header-title" id="menu-store-name"></span>
    <button class="app-header-cart" onclick="goToRecommend()">
      🛒<span class="cart-badge" id="cart-badge" style="display:none">0</span>
    </button>
  </div>
  <div class="menu-screen-body">
    <div class="category-tabs" id="category-tabs"></div>
    <div class="menu-list" id="menu-list"></div>
    <div class="cart-bottom">
      <button class="cart-bottom-btn" id="cart-btn" onclick="goToRecommend()" disabled>
        <span data-i18n="btn_view_cart">カートを見る</span>
        <span class="cart-count-badge" id="cart-count-badge">0点 ¥0</span>
      </button>
    </div>
  </div>
</div>

<!-- ===== オプションモーダル ===== -->
<div class="option-modal" id="option-modal">
  <div class="option-overlay" onclick="closeOptionModal()"></div>
  <div class="option-sheet">
    <div class="option-sheet-handle"></div>
    <div class="option-sheet-img" id="opt-img"></div>
    <div class="option-sheet-body">
      <div class="option-sheet-name" id="opt-name"></div>
      <div class="option-sheet-desc" id="opt-desc"></div>
      <div class="option-sheet-price" id="opt-price"></div>
      <div id="option-groups"></div>
      <div class="qty-selector">
        <span class="qty-selector-label" data-i18n="qty_label">数量</span>
        <button class="qty-btn" onclick="changeQty(-1)">－</button>
        <span class="qty-val" id="opt-qty">1</span>
        <button class="qty-btn active" onclick="changeQty(1)">＋</button>
      </div>
      <button class="add-to-cart-btn" id="add-to-cart-btn" onclick="addToCart()">
        <span data-i18n="btn_add_cart">カートに追加</span>
        <span id="add-btn-price">¥0</span>
      </button>
    </div>
  </div>
</div>

<!-- ===== SCREEN 3: レコメンド ===== -->
<div class="screen" id="screen-recommend">
  <div class="app-header">
    <button class="app-header-back" onclick="goScreen('screen-menu')">←</button>
    <span class="app-header-title" data-i18n="header_recommend">追加でいかがですか？</span>
    <span style="width:40px"></span>
  </div>
  <div class="recommend-screen-body">
    <div class="recommend-title" data-i18n="recommend_title">🎉 カートに追加しました！</div>
    <div class="recommend-sub" data-i18n="recommend_sub">一緒にいかがですか？</div>
    <div class="recommend-grid" id="recommend-grid"></div>
    <button class="skip-btn" onclick="goToCheckout()" data-i18n="btn_skip">このまま注文へ進む →</button>
  </div>
</div>

<!-- ===== SCREEN 4: 決済 ===== -->
<div class="screen" id="screen-checkout">
  <div class="app-header">
    <button class="app-header-back" onclick="goScreen('screen-recommend')">←</button>
    <span class="app-header-title" data-i18n="header_checkout">ご注文内容の確認</span>

/* =====================================================
   i18n
   ===================================================== */
function t(key) {
  return (I18N[currentLang] && I18N[currentLang][key] !== undefined)
    ? I18N[currentLang][key] : (I18N.ja[key] || key);
}
function changeLang(lang) {
  if (!I18N[lang]) return;
  currentLang = lang;
  document.getElementById('html-root').lang = lang;
  // data-i18n
  document.querySelectorAll('[data-i18n]').forEach(function(el) {
    var k = el.getAttribute('data-i18n');
    var v = t(k);
    if (el.tagName === 'OPTION') el.textContent = v;
    else el.innerHTML = v.replace(/\n/g,'<br>');
  });
  // data-i18n-placeholder
  document.querySelectorAll('[data-i18n-placeholder]').forEach(function(el) {
    el.placeholder = t(el.getAttribute('data-i18n-placeholder'));
  });
  // 動的再描画
  renderStores();
  renderPaymentOptions();
}

/* =====================================================
   BRAND CONFIG 適用
   ===================================================== */
function applyBrand() {
  var c = BRAND_CONFIG, r = document.documentElement;
  r.style.setProperty('--brand', c.primaryColor);
  r.style.setProperty('--brand-dark', c.primaryDark);
  r.style.setProperty('--brand-dim', 'rgba(' + hexToRgb(c.primaryColor) + ',.08)');
}
function hexToRgb(hex) {
  var r = parseInt(hex.slice(1,3),16), g = parseInt(hex.slice(3,5),16), b = parseInt(hex.slice(5,7),16);
  return r + ',' + g + ',' + b;
}

/* =====================================================
   URLパラメータ → 初期タブ設定
   ===================================================== */
function initFromUrl() {
  var params = new URLSearchParams(window.location.search);
  var mode = params.get('mode');
  if (mode === 'delivery') {
    setOrderType('delivery');
  } else {

  }
}

function openOption(id) {

    : '¥'+currentItem.price.toLocaleString()+' ('+t('opt_tax_incl').replace('%s', Math.floor(currentItem.price*(1+currentItem.tax/100)).toLocaleString())+')';

  renderOptionGroups();
  updateAddBtnPrice();

}

function renderOptionGroups() {
  var groups = currentItem.options;
  if (!groups||!groups.length){document.getElementById('option-groups').innerHTML='';return;}
  document.getElementById('option-groups').innerHTML = groups.map(function(g) {
    var subText = g.type==='counter'
      ? '<span class="req-badge">'+t('opt_required')+'</span>'+g.minTotal+'〜'+g.maxTotal
      : g.required ? '<span class="req-badge">'+t('opt_required')+'</span>' : '<span class="opt-badge">'+t('opt_optional')+'</span>'+(g.max>1?'Max '+g.max:'');
    var items = g.type==='counter'
      ? g.items.map(function(item){
          var val=(currentOptions[g.id]&&currentOptions[g.id][item.id])||0;
          return '<div class="option-item" style="flex-direction:column;align-items:stretch">'+
            '<div style="display:flex;align-items:center">'+
            '<div style="flex:1;font-size:14px">'+item.name+'</div>'+
            '<div style="font-size:13px;color:var(--brand);font-weight:600;margin-right:12px">'+(item.price>0?'¥'+item.price:t('opt_free'))+'</div>'+
            '<div class="option-item-counter">'+
            '<button class="counter-btn" onclick="changeCounter(\''+g.id+'\',\''+item.id+'\','+g.maxTotal+',-1)">－</button>'+
            '<span class="counter-val" id="cnt-'+g.id+'-'+item.id+'">'+val+'</span>'+
            '<button class="counter-btn active" onclick="changeCounter(\''+g.id+'\',\''+item.id+'\','+g.maxTotal+',1)">＋</button>'+
            '</div></div></div>';
        }).join('')+'<div class="counter-limit" id="cnt-total-'+g.id+'">0 / '+g.maxTotal+'</div>'
      : g.items.map(function(item){
          var isSel = g.type==='radio'?currentOptions[g.id]===item.id:(currentOptions[g.id]||[]).indexOf(item.id)>=0;
          return '<div class="option-item '+(g.type)+' '+(isSel?'selected':'')+'" onclick="selectOption(\''+g.id+'\',\''+item.id+'\',\''+g.type+'\','+g.max+')" id="opt-item-'+g.id+'-'+item.id+'">'+
            '<div class="option-item-control"></div>'+
            '<div class="option-item-name">'+item.name+'</div>'+
            '<div class="option-item-price '+(item.price===0?'free':'')+'">'+( item.price===0?t('opt_free'):'+¥'+item.price)+'</div>'+
            '</div>';
        }).join('');
    return '<div class="option-group">'+
      '<div class="option-group-header"><div class="option-group-title">'+g.title+'</div><div class="option-group-sub">'+subText+'</div></div>'+
      items+'</div>';
  }).join('');
}

function selectOption(groupId,itemId,type,max) {
  if (type==='radio') { currentOptions[groupId]=itemId; }
  else {
    if (!currentOptions[groupId]) currentOptions[groupId]=[];
    var arr=currentOptions[groupId], idx=arr.indexOf(itemId);
    if (idx>=0) arr.splice(idx,1);
    else if (arr.length<max) arr.push(itemId);
    else { showToast(t('toast_max').replace('%d',max)); return; }
  }
  renderOptionGroups(); updateAddBtnPrice();
}

function changeCounter(groupId,itemId,maxTotal,delta) {
  if (!currentOptions[groupId]) currentOptions[groupId]={};
  var total=Object.values(currentOptions[groupId]).reduce(function(a,b){return a+b;},0);
  var current=currentOptions[groupId][itemId]||0;
  if (delta>0&&total>=maxTotal){showToast(t('toast_max').replace('%d',maxTotal));return;}
  if (delta<0&&current<=0) return;
  currentOptions[groupId][itemId]=current+delta;
  var el=document.getElementById('cnt-'+groupId+'-'+itemId);
  if(el)el.textContent=currentOptions[groupId][itemId];
  var newTotal=Object.values(currentOptions[groupId]).reduce(function(a,b){return a+b;},0);
  var totEl=document.getElementById('cnt-total-'+groupId);
  if(totEl)totEl.textContent=newTotal+' / '+maxTotal;
  updateAddBtnPrice();
}

function changeQty(delta) {
  currentQty=Math.max(1,currentQty+delta);
  document.getElementById('opt-qty').textContent=currentQty;
  updateAddBtnPrice();
}

function calcOptionPrice() {
  if (!currentItem) return 0;
  var extra=0;
  currentItem.options.forEach(function(g){
    if (g.type==='radio'&&currentOptions[g.id]){
      var item=g.items.find(function(i){return i.id===currentOptions[g.id];});
      if(item)extra+=item.price;
    } else if (g.type==='checkbox'&&currentOptions[g.id]){
      currentOptions[g.id].forEach(function(iid){
        var item=g.items.find(function(i){return i.id===iid;}); if(item)extra+=item.price;
      });
    } else if (g.type==='counter'&&currentOptions[g.id]){
      g.items.forEach(function(item){extra+=(currentOptions[g.id][item.id]||0)*item.price;});
    }
  });
  return (currentItem.price+extra)*currentQty;
}

function updateAddBtnPrice() {
  document.getElementById('add-btn-price').textContent='¥'+calcOptionPrice().toLocaleString();
  document.getElementById('add-to-cart-btn').disabled=false;
}

function addToCart() {
  if (!currentItem) return;
  var optionLabel=[];
  currentItem.options.forEach(function(g){
    if(g.type==='radio'&&currentOptions[g.id]){var item=g.items.find(function(i){return i.id===currentOptions[g.id];});if(item)optionLabel.push(item.name);}
    else if(g.type==='checkbox'&&currentOptions[g.id]&&currentOptions[g.id].length>0){currentOptions[g.id].forEach(function(iid){var item=g.items.find(function(i){return i.id===iid;});if(item)optionLabel.push(item.name);});}
    else if(g.type==='counter'&&currentOptions[g.id]){g.items.forEach(function(item){var cnt=currentOptions[g.id][item.id]||0;if(cnt>0)optionLabel.push(item.name+'×'+cnt);});}
  });
  cart.push({id:currentItem.id,name:currentItem.name,price:currentItem.price,tax:currentItem.tax,
    optionPrice:calcOptionPrice()/currentQty-currentItem.price,optionLabel:optionLabel,
    qty:currentQty,total:calcOptionPrice(),emoji:currentItem.emoji});
  closeOptionModal(); updateCartUI(); showToast(t('toast_added'));
}

function closeOptionModal(){ document.getElementById('option-modal').classList.remove('open'); }

function updateCartUI(){
  var total=cart.reduce(function(s,i){return s+i.total;},0);
  var count=cart.reduce(function(s,i){return s+i.qty;},0);
  var badge=document.getElementById('cart-badge');
  badge.textContent=count; badge.style.display=count>0?'flex':'none';
  document.getElementById('cart-count-badge').textContent=count+'点 ¥'+total.toLocaleString();
  document.getElementById('cart-btn').disabled=count===0;
}

function renderOrderDetail(){
  document.getElementById('order-items-detail').innerHTML=cart.map(function(item){
    var opts=item.optionLabel.length?'<div style="font-size:11px;color:var(--text2)">'+item.optionLabel.join('・')+'</div>':'';
    return '<div class="order-item-row">'+
      '<div class="order-item-name">'+item.name+opts+'</div>'+
      '<div class="order-item-qty">×'+item.qty+'</div>'+
      '<div class="order-item-subtotal">¥'+item.total.toLocaleString()+'</div>'+
      '</div>';
  }).join('');
  updatePriceSummary();
}

function applyCoupon(){
  var code=document.getElementById('coupon-input').value.trim().toUpperCase();
  var coupons={
    'WELCOME20':{label:'Welcome 20%OFF',type:'percent',value:20},
    'SPRING10':{label:'Spring 10%OFF',type:'percent',value:10}
  };
  var coupon=coupons[code];
  if(!coupon){document.getElementById('coupon-result').innerHTML='<span style="color:var(--brand)">'+t('coupon_ng')+'</span>';return;}
  appliedCoupon=coupon;
  var subtotal=cart.reduce(function(s,i){return s+i.total;},0);
  discount=coupon.type==='percent'?Math.floor(subtotal*coupon.value/100):coupon.value;
  document.getElementById('coupon-result').innerHTML='<span style="color:var(--green)">✅ '+coupon.label+' '+t('coupon_ok')+'（−¥'+discount.toLocaleString()+'）</span>';
  updatePriceSummary();
}

function updatePriceSummary(){
  var subtotal=cart.reduce(function(s,i){return s+i.total;},0);
  var final=Math.max(0,subtotal-discount);
  var dr=document.getElementById('discount-rows');
  if(discount>0&&appliedCoupon){
    dr.innerHTML='<div class="checkout-discount"><span>'+appliedCoupon.label+'</span><span>－¥'+discount.toLocaleString()+'</span></div>';
  } else {dr.innerHTML='';}
  document.getElementById('total-price').textContent='¥'+final.toLocaleString();
  document.getElementById('submit-price').textContent='¥'+final.toLocaleString();
}

function submitOrder(){
  var btn=document.querySelector('.checkout-submit-btn');
  btn.disabled=true;
  btn.innerHTML='<span>'+t('processing')+'</span>';
  setTimeout(function(){
    var num=Math.floor(Math.random()*90)+10;
    document.getElementById('order-number').textContent=num;
    // 完了画面のサブテキスト（テイクアウト/デリバリーで切替）
    document.getElementById('complete-sub-text').textContent=
      orderType==='delivery'?t('complete_sub_delivery'):t('complete_sub_takeout');
    cart=[]; updateCartUI(); goScreen('screen-complete');
  },1500);
}

/* =====================================================
   UTILS
   ===================================================== */
function goScreen(id){
  document.querySelectorAll('.screen').forEach(function(s){s.classList.remove('active');});
  document.getElementById(id).classList.add('active');
  window.scrollTo(0,0);
}

function goHome(){
  goScreen('screen-map'); cart=[]; updateCartUI();
  selectedStore=null; renderStores();
  document.getElementById('select-store-btn').disabled=true;
  document.querySelector('.checkout-submit-btn').disabled=false;
  document.querySelector('.checkout-submit-btn').innerHTML=
    '<span data-i18n="btn_submit">'+t('btn_submit')+'</span><span id="submit-price">¥0</span>';
  appliedCoupon=null; discount=0;
}

function showToast(msg){
  var el=document.getElementById('toast');
  el.textContent=msg; el.classList.add('show');
  setTimeout(function(){el.classList.remove('show');},2000);
}

/* ===== INIT ===== */
applyBrand();
initFromUrl();
renderPaymentOptions();
</script>
</body>
</html>
