<!DOCTYPE html>
<html lang="ja" id="html-root">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>店舗を探す | 炭火亭</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&family=Noto+Serif+JP:wght@400;700&display=swap" rel="stylesheet">
<style>
:root{
  --brand-primary:#D32F2F; --brand-primary-dark:#B71C1C; --brand-primary-light:#FFEBEE;
  --brand-header-bg:#D32F2F; --brand-header-text:#FFFFFF;
  --brand-font:'Noto Sans JP',sans-serif; --brand-font-color:#333;
  --text2:#666; --text3:#999; --bg:#fff; --bg2:#F8F8F8; --border:#E0E0E0; --shadow:0 2px 8px rgba(0,0,0,.1);
}
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{font-family:var(--brand-font);color:var(--brand-font-color);background:var(--bg);font-size:14px;line-height:1.6}
a{color:inherit;text-decoration:none} button{cursor:pointer}

/* HEADER（共通） */
.header{background:var(--brand-header-bg);position:sticky;top:0;z-index:1000}
.header-main{max-width:1100px;margin:0 auto;display:flex;align-items:center;height:56px;padding:0 20px}
.header-logo a{display:flex;align-items:center;gap:10px;margin-right:32px}
.header-logo-mark{width:44px;height:44px;background:white;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0}
.header-logo-text{color:var(--brand-header-text);font-size:20px;font-weight:700;font-family:'Noto Serif JP',serif;white-space:nowrap}
.header-nav{display:flex;align-items:center;flex:1}
.header-nav-link{color:var(--brand-header-text);font-size:13px;font-weight:500;padding:0 14px;height:56px;display:flex;align-items:center;white-space:nowrap;transition:background .15s;border:none;background:none;font-family:var(--brand-font);cursor:pointer;text-decoration:none}
.header-nav-link:hover{background:rgba(0,0,0,.15)}
.header-nav-link.cta{background:rgba(0,0,0,.25);border-radius:3px;margin:0 3px;height:38px;font-weight:700;font-size:12px;padding:0 12px}
.header-nav-link.active{background:rgba(0,0,0,.2);border-bottom:3px solid white}
.lang-select-wrap{margin-left:auto;position:relative;flex-shrink:0}
.lang-select{appearance:none;-webkit-appearance:none;background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.4);color:var(--brand-header-text);font-size:11px;padding:4px 22px 4px 8px;border-radius:3px;cursor:pointer;font-family:var(--brand-font);outline:none}
.lang-select-arrow{position:absolute;right:6px;top:50%;transform:translateY(-50%);pointer-events:none;color:var(--brand-header-text);font-size:9px}
.header-hamburger{display:none;background:none;border:none;color:var(--brand-header-text);font-size:26px;margin-left:auto;padding:8px}
.mobile-nav{display:none;position:fixed;top:56px;left:0;right:0;background:var(--brand-primary-dark);z-index:999;flex-direction:column;padding:8px 0;box-shadow:0 4px 12px rgba(0,0,0,.3)}
.mobile-nav.open{display:flex}
.mobile-nav a{color:white;font-size:14px;padding:14px 24px;border-bottom:1px solid rgba(255,255,255,.1);display:flex;align-items:center;gap:10px}

/* PAGE HERO */
.page-hero{background:var(--brand-primary);padding:28px 20px;text-align:center;color:white}
.page-hero h1{font-size:28px;font-weight:700;font-family:'Noto Serif JP',serif}
.page-hero p{font-size:13px;opacity:.85;margin-top:6px}

/* SEARCH AREA */
.search-area{background:var(--bg2);border-bottom:1px solid var(--border);padding:20px}
.search-area-inner{max-width:1060px;margin:0 auto}
.search-bar{display:flex;gap:8px;margin-bottom:16px}
.search-input{flex:1;padding:12px 16px;border:2px solid var(--border);border-radius:4px;font-family:var(--brand-font);font-size:14px;outline:none;transition:border-color .2s}
.search-input:focus{border-color:var(--brand-primary)}
.search-btn{padding:12px 24px;background:var(--brand-primary);color:white;border:none;border-radius:4px;font-family:var(--brand-font);font-size:14px;font-weight:700;display:flex;align-items:center;gap:6px}
.search-btn:hover{background:var(--brand-primary-dark)}

/* 都道府県エリア */
.area-section{margin-bottom:16px}
.area-section-title{font-size:12px;font-weight:700;color:var(--text3);letter-spacing:.1em;margin-bottom:8px}
.area-grid{display:grid;grid-template-columns:repeat(8,1fr);gap:4px}
.area-btn{padding:7px 4px;font-size:12px;border:1px solid var(--border);border-radius:3px;background:white;color:var(--brand-font-color);font-family:var(--brand-font);cursor:pointer;text-align:center;transition:all .15s}
.area-btn:hover,.area-btn.active{background:var(--brand-primary);color:white;border-color:var(--brand-primary)}

/* サービス属性フィルター */
.attr-section{margin-top:12px}
.attr-section-title{font-size:12px;font-weight:700;color:var(--text3);letter-spacing:.1em;margin-bottom:8px}
.attr-chips{display:flex;flex-wrap:wrap;gap:6px}
.attr-chip{display:inline-flex;align-items:center;gap:4px;padding:5px 12px;border:1px solid var(--border);border-radius:20px;font-size:12px;background:white;cursor:pointer;transition:all .15s;font-family:var(--brand-font)}
.attr-chip:hover{border-color:var(--brand-primary);color:var(--brand-primary)}
.attr-chip.active{background:var(--brand-primary);color:white;border-color:var(--brand-primary)}
.attr-chip input{display:none}

/* RESULTS */
.results-area{max-width:1060px;margin:0 auto;padding:24px 20px 60px}
.results-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.results-count{font-size:14px;font-weight:700}
.results-count span{color:var(--brand-primary);font-size:18px}
.results-sort{font-size:12px;color:var(--text2);border:1px solid var(--border);padding:5px 10px;border-radius:3px;background:white;font-family:var(--brand-font);cursor:pointer}

/* 都道府県セクション */
.pref-section{margin-bottom:36px}
.pref-header{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:2px solid var(--brand-primary);margin-bottom:12px}
.pref-header h2{font-size:18px;font-weight:700}
.pref-header .pref-count{font-size:12px;color:var(--text3);margin-left:auto}

/* 店舗カード */
.store-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}
.store-card{border:1px solid var(--border);border-radius:6px;overflow:hidden;cursor:pointer;transition:all .2s;background:white;text-decoration:none;display:block}
.store-card:hover{border-color:var(--brand-primary);box-shadow:0 4px 16px rgba(211,47,47,.15);transform:translateY(-2px)}
.store-card-img{width:100%;aspect-ratio:16/9;object-fit:cover;display:flex;align-items:center;justify-content:center;font-size:40px;background:linear-gradient(135deg,#1a0000,#5a1a1a);position:relative}
.store-card-body{padding:12px 14px 14px}
.store-card-name{font-size:14px;font-weight:700;margin-bottom:4px}
.store-card-addr{font-size:12px;color:var(--text2);margin-bottom:6px}
.store-card-station{font-size:12px;color:var(--brand-primary);margin-bottom:8px;display:flex;align-items:center;gap:4px}
.store-card-station::before{content:'🚉';font-size:12px}
.store-card-attrs{display:flex;flex-wrap:wrap;gap:4px}
.store-attr-tag{font-size:10px;padding:2px 7px;border:1px solid var(--border);border-radius:10px;color:var(--text2);background:var(--bg2)}
.store-attr-tag.on{border-color:var(--brand-primary);color:var(--brand-primary);background:var(--brand-primary-light)}
.store-card-hours{font-size:11px;color:var(--text3);margin-top:6px}
/* 空き状況バッジ */
.store-avail{position:absolute;top:8px;right:8px;font-size:10px;font-weight:700;padding:3px 8px;border-radius:10px}
.avail-ok{background:#E8F5E9;color:#2E7D32}
.avail-few{background:#FFF3E0;color:#E65100}
.avail-full{background:#FFEBEE;color:#C62828}

/* NO RESULT */
.no-result{text-align:center;padding:60px 20px;color:var(--text3)}
.no-result p{font-size:14px;margin-top:12px}

@media(max-width:800px){
  .area-grid{grid-template-columns:repeat(5,1fr)}
  .store-grid{grid-template-columns:repeat(2,1fr)}
  .header-nav{display:none}.header-hamburger{display:block}
}
@media(max-width:540px){
  .area-grid{grid-template-columns:repeat(4,1fr)}
  .store-grid{grid-template-columns:1fr}
}
</style>
</head>

<header class="header">

<div class="page-hero">
  <h1>店舗を探す</h1>
  <p>炭火亭の全店舗一覧</p>
</div>

<!-- 検索エリア -->
<div class="search-area">
  <div class="search-area-inner">
    <!-- フリーワード検索 -->
    <div class="search-bar">
      <input type="text" class="search-input" id="search-q" placeholder="エリア・駅名・店舗名で検索" oninput="filterStores()">

<!-- 結果 -->
<div class="results-area">

<script>
/* =====================================================
   BRAND CONFIG
   ===================================================== */
var BRAND_CONFIG = {
  primaryColor:'#D32F2F', primaryDark:'#B71C1C', primaryLight:'#FFEBEE',
  headerBg:'#D32F2F', headerTextColor:'#FFFFFF', fontColor:'#333333',
  fontFamily:'Noto Sans JP', logoMarkEmoji:'🔥', logoTextValue:'炭火亭'
};

/* =====================================================
   店舗属性定義（AIdenが保持する標準属性）
   管理画面の「店舗情報作成」時にチェックボックスで設定
   ===================================================== */
var STORE_ATTRS = [
  { key:'parking',         label:'駐車場あり',       icon:'🅿️' },
  { key:'handicap_parking', label:'身障者用駐車場',   icon:'♿' },
  { key:'elevator',        label:'エレベーター',      icon:'🔼' },
  { key:'multi_toilet',    label:'多目的トイレ',      icon:'🚻' },
  { key:'diaper',          label:'おむつ替えシート',  icon:'👶' },
  { key:'credit',          label:'クレジット可',      icon:'💳' },
  { key:'qrpay',           label:'二次元コード決済可', icon:'📲' },
  { key:'cash',            label:'現金決済可',        icon:'💴' },
  { key:'smoking',         label:'喫煙可',            icon:'🚬' }
];

/* =====================================================
   STORE DATA（Supabase stores テーブルから取得）
   各店舗のattrsはチェックボックスで設定した属性キーの配列
   storeUrl: 個店ページのURL（aiden-store-v5.3.html等）
   ===================================================== */
var STORES = [
  { id:'shibuya', name:'炭火亭 渋谷店',  pref:'東京都', city:'渋谷区', addr:'東京都渋谷区恵比寿1-2-3',  station:'渋谷駅 徒歩5分',  hours:'17:00〜23:00', bg:'linear-gradient(135deg,#1a0000,#5a1a1a)', avail:'ok',   attrs:['parking','credit','qrpay','cash','elevator','multi_toilet'], storeUrl:'./aiden-store-v5.3.html' },
  { id:'shinjuku', name:'炭火亭 新宿東口店', pref:'東京都', city:'新宿区', addr:'東京都新宿区新宿3-1-1', station:'新宿駅 徒歩3分',  hours:'17:00〜24:00', bg:'linear-gradient(135deg,#1a1a00,#5a5a00)', avail:'few',  attrs:['credit','qrpay','cash','smoking'], storeUrl:'./aiden-store-v5.3.html' },
  { id:'ikebukuro', name:'炭火亭 池袋店', pref:'東京都', city:'豊島区', addr:'東京都豊島区南池袋1-1-1', station:'池袋駅 徒歩4分',  hours:'17:00〜23:00', bg:'linear-gradient(135deg,#001a00,#005a00)', avail:'ok',   attrs:['parking','handicap_parking','credit','qrpay','cash','elevator','multi_toilet','diaper'], storeUrl:'./aiden-store-v5.3.html' },
  { id:'ebisu', name:'炭火亭 恵比寿店',   pref:'東京都', city:'渋谷区', addr:'東京都渋谷区恵比寿4-5-6',  station:'恵比寿駅 徒歩2分', hours:'18:00〜23:00', bg:'linear-gradient(135deg,#001a1a,#005a5a)', avail:'full', attrs:['credit','qrpay','cash'], storeUrl:'./aiden-store-v5.3.html' },
  { id:'yokohama', name:'炭火亭 横浜店',  pref:'神奈川県', city:'横浜市', addr:'神奈川県横浜市西区南幸1-1', station:'横浜駅 徒歩6分', hours:'17:00〜23:00', bg:'linear-gradient(135deg,#1a001a,#5a005a)', avail:'ok',   attrs:['parking','credit','qrpay','cash','elevator'], storeUrl:'./aiden-store-v5.3.html' },
  { id:'kawasaki', name:'炭火亭 川崎店',  pref:'神奈川県', city:'川崎市', addr:'神奈川県川崎市川崎区駅前本町1', station:'川崎駅 徒歩3分', hours:'17:00〜23:00', bg:'linear-gradient(135deg,#001a2a,#005a7a)', avail:'few',  attrs:['parking','handicap_parking','credit','qrpay','cash','elevator','multi_toilet'], storeUrl:'./aiden-store-v5.3.html' },
  { id:'umeda', name:'炭火亭 梅田店',    pref:'大阪府', city:'大阪市', addr:'大阪府大阪市北区梅田1-1-1', station:'梅田駅 徒歩4分',  hours:'17:00〜24:00', bg:'linear-gradient(135deg,#2a1a00,#7a5000)', avail:'ok',   attrs:['credit','qrpay','cash','smoking'], storeUrl:'./aiden-store-v5.3.html' },
  { id:'namba', name:'炭火亭 難波店',    pref:'大阪府', city:'大阪市', addr:'大阪府大阪市中央区難波3-1', station:'難波駅 徒歩2分',  hours:'17:00〜24:00', bg:'linear-gradient(135deg,#2a002a,#7a007a)', avail:'ok',   attrs:['credit','qrpay','cash'], storeUrl:'./aiden-store-v5.3.html' },
  { id:'nagoya', name:'炭火亭 名古屋栄店', pref:'愛知県', city:'名古屋市', addr:'愛知県名古屋市中区栄3-1', station:'栄駅 徒歩4分',   hours:'17:00〜23:00', bg:'linear-gradient(135deg,#002a1a,#007a4a)', avail:'few',  attrs:['parking','credit','qrpay','cash','elevator','multi_toilet'], storeUrl:'./aiden-store-v5.3.html' },
  { id:'fukuoka', name:'炭火亭 天神店',  pref:'福岡県', city:'福岡市', addr:'福岡県福岡市中央区天神2-1', station:'天神駅 徒歩3分',  hours:'17:00〜23:00', bg:'linear-gradient(135deg,#002a2a,#007a7a)', avail:'ok',   attrs:['credit','qrpay','cash'], storeUrl:'./aiden-store-v5.3.html' },
  { id:'sapporo', name:'炭火亭 札幌大通店', pref:'北海道', city:'札幌市', addr:'北海道札幌市中央区大通西4', station:'大通駅 徒歩2分', hours:'17:00〜23:00', bg:'linear-gradient(135deg,#1a1a2a,#4a4a7a)', avail:'ok',   attrs:['parking','handicap_parking','credit','qrpay','cash','elevator','multi_toilet','diaper'], storeUrl:'./aiden-store-v5.3.html' },
  { id:'sendai', name:'炭火亭 仙台店',   pref:'宮城県', city:'仙台市', addr:'宮城県仙台市青葉区中央1-1', station:'仙台駅 徒歩5分',  hours:'17:00〜23:00', bg:'linear-gradient(135deg,#002a00,#007a00)', avail:'few',  attrs:['parking','credit','cash'], storeUrl:'./aiden-store-v5.3.html' },
];

/* =====================================================
   State
   ===================================================== */
var activePrefs = [];
var activeAttrs = [];

/* =====================================================
   Build UI
   ===================================================== */
var PREFS = ['北海道','宮城県','東京都','神奈川県','愛知県','大阪府','福岡県'];

function buildAreaGrid() {
  var el = document.getElementById('area-grid');
  el.innerHTML = ['全て'].concat(PREFS).map(function(p) {
    return '<button class="area-btn'+(p==='全て'?' active':'')+'" onclick="togglePref(\''+p+'\',this)">'+p+'</button>';
  }).join('');
}

function buildAttrChips() {
  var el = document.getElementById('attr-chips');
  el.innerHTML = STORE_ATTRS.map(function(a) {
    return '<label class="attr-chip" id="chip-'+a.key+'">'
      + '<input type="checkbox" value="'+a.key+'" onchange="toggleAttr(\''+a.key+'\',this)">'
      + a.icon + ' ' + a.label + '</label>';
  }).join('');
}

function togglePref(pref, btn) {
  if (pref === '全て') {
    activePrefs = [];
    document.querySelectorAll('.area-btn').forEach(function(b){ b.classList.remove('active'); });
    btn.classList.add('active');
  } else {
    // 「全て」を外す
    document.querySelectorAll('.area-btn').forEach(function(b){ if(b.textContent==='全て') b.classList.remove('active'); });
    btn.classList.toggle('active');
    var idx = activePrefs.indexOf(pref);
    if (idx > -1) activePrefs.splice(idx,1); else activePrefs.push(pref);
    if (activePrefs.length === 0) document.querySelector('.area-btn').classList.add('active');
  }
  filterStores();
}

function toggleAttr(key, checkbox) {
  var chip = document.getElementById('chip-'+key);
  if (checkbox.checked) { activeAttrs.push(key); chip.classList.add('active'); }
  else { activeAttrs = activeAttrs.filter(function(k){ return k!==key; }); chip.classList.remove('active'); }
  filterStores();
}

function filterStores() {
  var q = (document.getElementById('search-q').value || '').trim();
  var filtered = STORES.filter(function(s) {
    var matchQ = !q || s.name.includes(q) || s.addr.includes(q) || s.station.includes(q) || s.pref.includes(q) || s.city.includes(q);
    var matchPref = activePrefs.length === 0 || activePrefs.indexOf(s.pref) > -1;
    var matchAttr = activeAttrs.length === 0 || activeAttrs.every(function(a){ return s.attrs.indexOf(a) > -1; });
    return matchQ && matchPref && matchAttr;
  });
  renderResults(filtered);
}

function renderResults(stores) {
  var body = document.getElementById('results-body');
  document.getElementById('results-count').innerHTML = '検索結果：<span>'+stores.length+'</span> 件';
  if (stores.length === 0) {
    body.innerHTML = '<div class="no-result"><div style="font-size:48px">🔍</div><p>条件に合う店舗が見つかりませんでした。<br>絞り込み条件を変更してみてください。</p></div>';
    return;
  }
  // 都道府県別にグルーピング
  var grouped = {};
  stores.forEach(function(s) { (grouped[s.pref] = grouped[s.pref]||[]).push(s); });
  var html = '';
  Object.keys(grouped).forEach(function(pref) {
    var list = grouped[pref];
    html += '<div class="pref-section">'
      + '<div class="pref-header"><h2>'+pref+'</h2><span class="pref-count">'+list.length+'店舗</span></div>'
      + '<div class="store-grid">';
    list.forEach(function(s) {
      var availLabel = s.avail==='ok' ? '空あり' : s.avail==='few' ? '残りわずか' : '満席';
      var availCls   = s.avail==='ok' ? 'avail-ok' : s.avail==='few' ? 'avail-few' : 'avail-full';
      var attrTags = STORE_ATTRS.map(function(a){
        var on = s.attrs.indexOf(a.key) > -1;
        return on ? '<span class="store-attr-tag on">'+a.icon+' '+a.label+'</span>' : '';
      }).join('');
      html += '<a class="store-card" href="'+s.storeUrl+'">'
        + '<div class="store-card-img" style="background:'+s.bg+'">🏪<span class="store-avail '+availCls+'">'+availLabel+'</span></div>'
        + '<div class="store-card-body">'
        + '<div class="store-card-name">'+s.name+'</div>'
        + '<div class="store-card-addr">'+s.addr+'</div>'
        + '<div class="store-card-station">'+s.station+'</div>'
        + '<div class="store-card-attrs">'+attrTags+'</div>'
        + '<div class="store-card-hours">営業時間：'+s.hours+'</div>'
        + '</div></a>';
    });
    html += '</div></div>';
  });
  body.innerHTML = html;
}

/* =====================================================
   i18n
   ===================================================== */
var I18N_STORES = {
  ja:{ page_title:'店舗を探す' },
  en:{ page_title:'Find a Store' },
  zh:{ page_title:'查找门店' },
  ko:{ page_title:'매장 찾기' },
  fr:{ page_title:'Trouver un restaurant' },
  it:{ page_title:'Trova un ristorante' },
  id:{ page_title:'Cari Restoran' }
};
function changeLang(lang) {
  var d = I18N_STORES[lang]; if(!d) return;
  document.querySelectorAll('[data-i18n]').forEach(function(el){
    var k = el.getAttribute('data-i18n'); if(d[k]) el.textContent = d[k];
  });
}

function applyBrand() {
  var c = BRAND_CONFIG, r = document.documentElement;
  r.style.setProperty('--brand-primary', c.primaryColor);
  r.style.setProperty('--brand-primary-dark', c.primaryDark);
  r.style.setProperty('--brand-primary-light', c.primaryLight);
  r.style.setProperty('--brand-header-bg', c.headerBg);
  r.style.setProperty('--brand-header-text', c.headerTextColor);
  r.style.setProperty('--brand-font-color', c.fontColor);
  r.style.setProperty('--brand-font', "'"+c.fontFamily+"',sans-serif");
  document.getElementById('logo-text').textContent = c.logoTextValue;
}

function toggleNav() {
  document.getElementById('mobile-nav').classList.toggle('open');
  document.getElementById('hamburger').textContent = document.getElementById('mobile-nav').classList.contains('open') ? '✕' : '☰';
}

// URLパラメータから初期検索ワード取得
function getUrlParam(key) {
  return new URLSearchParams(window.location.search).get(key) || '';
}

document.addEventListener('DOMContentLoaded', function() {
  applyBrand();
  buildAreaGrid();
  buildAttrChips();
  var q = getUrlParam('q');
  if (q) document.getElementById('search-q').value = q;
  filterStores();
});
</script>
