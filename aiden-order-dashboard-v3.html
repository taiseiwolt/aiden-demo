<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1024">
<title>AIden 受注ダッシュボード</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;600;700;800;900&display=swap');
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Noto Sans JP',sans-serif;overflow:hidden;height:100vh;background:#F7F7F7;color:#1A1A1A}
  ::-webkit-scrollbar{width:4px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:#D0D0D0;border-radius:2px}
  @keyframes fadeIn{from{opacity:0}to{opacity:1}}
  @keyframes slideUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
  @keyframes pulseRing{0%{box-shadow:0 0 0 0 rgba(220,50,50,0.4)}70%{box-shadow:0 0 0 8px rgba(220,50,50,0)}100%{box-shadow:0 0 0 0 rgba(220,50,50,0)}}
  .app{display:flex;height:100vh}
  .sidebar{width:64px;background:#111;display:flex;flex-direction:column;align-items:center;padding:16px 0;flex-shrink:0}
  .sidebar-logo{margin-bottom:28px;display:flex;align-items:center;justify-content:center}
  .sidebar-logo img{height:16px;filter:brightness(0) invert(1)}
  .nav-item{width:48px;height:48px;border-radius:10px;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;margin-bottom:2px;position:relative;transition:background .15s}
  .nav-item:hover{background:rgba(255,255,255,.06)}.nav-item.active{background:rgba(255,255,255,.1)}
  .nav-item .icon{font-size:18px}.nav-item .label{font-size:8px;color:#666;margin-top:1px;letter-spacing:.5px}
  .nav-item.active .label{color:#aaa;font-weight:700}
  .nav-badge{position:absolute;top:2px;right:2px;min-width:16px;height:16px;border-radius:8px;background:#DC3232;color:#fff;font-size:9px;font-weight:800;display:flex;align-items:center;justify-content:center;padding:0 3px}
  .sidebar-bottom{margin-top:auto}
  .test-btn{width:40px;height:40px;border-radius:8px;background:#222;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:16px;transition:background .15s}
  .test-btn:hover{background:#333}
  .main{flex:1;display:flex;flex-direction:column;overflow:hidden}
  .header{height:52px;background:#fff;display:flex;align-items:center;padding:0 24px;border-bottom:1px solid #E8E8E8;flex-shrink:0;transition:background .3s}
  .header.paused{background:#1A1A1A;border-bottom-color:#333}
  .store-name{font-weight:700;font-size:14px;color:#1A1A1A}.header.paused .store-name{color:#fff}
  .pause-ind{margin-left:12px;font-size:11px;color:#DC3232;font-weight:700;display:none}.header.paused .pause-ind{display:block}
  .hspacer{flex:1}
  .h-btn{display:flex;align-items:center;gap:5px;padding:5px 10px;border-radius:6px;cursor:pointer;background:#F2F2F2;margin-left:6px;font-size:11px;color:#666;font-weight:600;transition:background .12s;border:none}
  .h-btn:hover{background:#E8E8E8}.header.paused .h-btn{background:#2A2A2A;color:#999}
  .dot{width:6px;height:6px;border-radius:3px}.dot.on{background:#4CAF50}.dot.off{background:#DC3232}
  .notif-wrap{position:relative}
  .notif-badge{position:absolute;top:-6px;right:-6px;min-width:14px;height:14px;border-radius:7px;background:#DC3232;color:#fff;font-size:8px;font-weight:800;display:flex;align-items:center;justify-content:center}
  .pause-toggle{padding:5px 14px;border-radius:6px;cursor:pointer;font-weight:700;font-size:11px;background:#1A1A1A;color:#fff;border:none;margin-left:6px;transition:all .15s}
  .pause-toggle:hover{background:#333}.header.paused .pause-toggle{background:#fff;color:#1A1A1A}
  .pause-menu{position:absolute;top:40px;right:0;background:#fff;border-radius:10px;box-shadow:0 8px 32px rgba(0,0,0,.15);padding:6px;z-index:100;width:180px;border:1px solid #E8E8E8}
  .pm-title{font-size:10px;font-weight:700;color:#999;padding:6px 10px;text-transform:uppercase;letter-spacing:1px}
  .pm-item{padding:8px 10px;border-radius:6px;cursor:pointer;font-size:13px;font-weight:600;color:#333;transition:background .12s}.pm-item:hover{background:#F5F5F5}
  .filters{display:flex;align-items:center;gap:4px;padding:12px 24px 8px;flex-shrink:0}
  .ftab{padding:6px 14px;border-radius:6px;cursor:pointer;font-size:12px;font-weight:600;color:#999;transition:all .12s;background:transparent;border:none}
  .ftab:hover{color:#555;background:#EDEDED}.ftab.active{background:#1A1A1A;color:#fff}
  .cnt{margin-left:4px;opacity:.6;font-size:10px}
  .pulse-dot{display:inline-block;width:6px;height:6px;border-radius:3px;background:#DC3232;margin-left:4px;vertical-align:middle;animation:pulseRing 1.5s infinite}
  .table-area{flex:1;overflow:auto;padding:0 24px 24px}
  .otable{width:100%;border-collapse:separate;border-spacing:0 3px}
  .otable th{font-size:10px;font-weight:700;color:#AAA;text-transform:uppercase;letter-spacing:1px;padding:4px 12px;text-align:left;white-space:nowrap}
  .otable th.r{text-align:right}
  .orow{cursor:pointer;transition:all .12s}
  .orow:hover td{background:#EDEDED}
  .orow td{background:#fff;padding:11px 12px;font-size:13px;font-weight:500;white-space:nowrap}
  .orow td:first-child{border-radius:6px 0 0 6px}.orow td:last-child{border-radius:0 6px 6px 0}
  .orow.is-new{box-shadow:inset 3px 0 0 #DC3232}
  .spill{display:inline-flex;align-items:center;gap:4px;padding:3px 8px;border-radius:4px;font-size:11px;font-weight:700}
  .oid{font-weight:800;font-size:14px;letter-spacing:-.5px}
  .tcell{display:flex;align-items:center;gap:5px;white-space:nowrap}
  .temoji{font-size:15px}.tname{font-weight:600;font-size:12px}
  .ch-logo{height:18px;vertical-align:middle;object-fit:contain;border-radius:3px}
  .ch-logo-wrap{display:flex;align-items:center;gap:0}
  .chtag{font-size:10px;color:#999;font-weight:500;background:#F2F2F2;padding:2px 6px;border-radius:3px}
  .tval{font-weight:700;font-size:13px}.ttotal{font-weight:800;font-size:14px;text-align:right}
  .isum{font-size:12px;color:#888;max-width:220px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;display:block}
  .ndot{display:inline-block;width:6px;height:6px;border-radius:3px;background:#F59E0B;margin-left:4px;vertical-align:middle}
  .abtn{padding:6px 16px;border-radius:6px;font-weight:700;font-size:12px;cursor:pointer;border:none;background:#DC3232;color:#fff;transition:all .12s;white-space:nowrap}
  .abtn:hover{background:#C62828}
  .abtn2{padding:5px 12px;border-radius:6px;font-weight:600;font-size:11px;cursor:pointer;border:1px solid #DDD;background:#fff;color:#555;transition:all .12s;white-space:nowrap}
  .abtn2:hover{background:#F5F5F5}
  .overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);display:flex;align-items:center;justify-content:center;z-index:1000;animation:fadeIn .15s}
  .popup{background:#fff;border-radius:16px;width:520px;max-height:88vh;overflow:auto;box-shadow:0 24px 80px rgba(0,0,0,.25);animation:slideUp .2s}
  .p-head{padding:20px 24px 0;display:flex;justify-content:space-between;align-items:flex-start}
  .p-oid{font-size:22px;font-weight:900;letter-spacing:-1px}
  .p-close{width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:16px;color:#999;background:#F2F2F2;border:none;transition:background .12s}
  .p-close:hover{background:#E0E0E0}
  .p-meta{padding:12px 24px 16px;display:flex;gap:6px;flex-wrap:wrap;align-items:center}
  .p-tag{font-size:11px;font-weight:600;padding:4px 10px;border-radius:5px;background:#F2F2F2;color:#555;display:inline-flex;align-items:center;gap:4px}
  .p-tag img{height:14px}
  .p-div{height:1px;background:#EEE;margin:0 24px}
  .p-sec{padding:0 24px 16px}.p-sec-t{font-size:10px;font-weight:700;color:#AAA;text-transform:uppercase;letter-spacing:1px;margin-bottom:8px}
  .p-irow{display:flex;align-items:center;padding:8px 0;font-size:13px}
  .p-iname{flex:1;font-weight:600}.p-iqty{color:#999;margin:0 8px;font-size:12px}.p-iprice{font-weight:700;min-width:70px;text-align:right}
  .p-iopt{font-size:11px;color:#999;padding-left:12px;margin-top:2px}
  .p-total{display:flex;justify-content:space-between;padding:12px 24px}.p-tl{font-weight:800;font-size:14px}.p-tv{font-weight:900;font-size:18px}
  .p-note{margin:0 24px 12px;padding:10px 12px;border-radius:8px;font-size:12px;background:#FAFAFA;border:1px solid #EEE}
  .p-note .nl{font-weight:700;color:#555}
  .p-cust{margin:0 24px 12px;display:grid;grid-template-columns:1fr 1fr;gap:8px}
  .p-cust-box{padding:10px 12px;border-radius:8px;font-size:12px;background:#FAFAFA;border:1px solid #EEE}
  .p-cust-box .nl{font-weight:700;color:#555;display:block;margin-bottom:2px}
  .p-acts{padding:8px 24px 20px;display:flex;flex-direction:column;gap:6px}
  .p-btn{padding:11px 0;border-radius:8px;text-align:center;font-weight:700;font-size:13px;cursor:pointer;border:none;transition:all .12s;width:100%}
  .p-btn:hover{opacity:.88}
  .p-btn.adv{background:#1A1A1A;color:#fff}
  .p-btn.cnl{background:#fff;color:#DC3232;border:1px solid #F0D0D0}
  .p-btn.cnl:hover{background:#FFF5F5}
  .p-btn.rep{background:#F7F7F7;color:#555}
  .sbar{display:flex;gap:3px;margin-bottom:12px}
  .sstep{flex:1}.sbar-b{height:3px;border-radius:2px;margin-bottom:3px}.sbar-l{font-size:9px;text-align:center;font-weight:600}
  .cpop{background:#fff;border-radius:16px;width:420px;max-height:80vh;overflow:auto;box-shadow:0 24px 80px rgba(0,0,0,.25);animation:slideUp .2s;padding:24px}
  .cp-t{font-size:16px;font-weight:800;margin-bottom:4px}.cp-s{font-size:12px;color:#999;margin-bottom:16px}
  .cp-opt{padding:12px 14px;border-radius:8px;cursor:pointer;font-size:13px;font-weight:600;margin-bottom:6px;border:1px solid #EEE;transition:all .12s;display:flex;align-items:center;gap:10px}
  .cp-opt:hover{background:#F7F7F7;border-color:#DDD}
  .cp-odesc{font-size:11px;color:#999;font-weight:400;margin-top:2px}
  .cp-back{margin-top:12px;text-align:center;font-size:12px;color:#999;cursor:pointer;padding:8px}.cp-back:hover{color:#555}
  .cr-opt{padding:10px 14px;border-radius:8px;cursor:pointer;font-size:13px;font-weight:600;margin-bottom:4px;border:1px solid #EEE;transition:background .12s}
  .cr-opt:hover{background:#F5F5F5}
  .cr-note{font-size:11px;color:#DC3232;margin-top:12px;padding:10px;background:#FFF5F5;border-radius:6px;font-weight:500}
  .pchk{width:20px;height:20px;border:2px solid #DDD;border-radius:4px;margin-right:10px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .12s;flex-shrink:0}
  .pchk.on{background:#DC3232;border-color:#DC3232}
  .pchk.on::after{content:"✓";color:#fff;font-size:12px;font-weight:700}
  .na{background:#fff;border-radius:16px;width:500px;max-height:85vh;overflow:auto;box-shadow:0 24px 80px rgba(0,0,0,.25);animation:slideUp .25s}
  .na-h{background:#1A1A1A;padding:20px 24px;border-radius:16px 16px 0 0;display:flex;align-items:center;gap:12px}
  .na-ring{width:40px;height:40px;border-radius:10px;background:#DC3232;display:flex;align-items:center;justify-content:center;font-size:20px;animation:pulseRing 1.5s infinite}
  .na-t{color:#fff;font-size:16px;font-weight:800}.na-s{color:#888;font-size:12px;font-weight:500}
  .na-b{padding:20px 24px}
  .na-g{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:16px}
  .na-box{background:#F7F7F7;border-radius:8px;padding:10px}.na-lbl{font-size:10px;color:#AAA;font-weight:600;text-transform:uppercase;letter-spacing:.5px;margin-bottom:2px}
  .na-val{font-size:14px;font-weight:800}.na-val.lg{font-size:18px}
  .na-acts{display:flex;gap:10px;margin-top:16px}
  .na-btn{flex:1;padding:12px 0;border-radius:8px;text-align:center;font-weight:800;font-size:14px;cursor:pointer;border:none;transition:all .12s}
  .na-btn.rej{background:#F2F2F2;color:#666}.na-btn.rej:hover{background:#E8E8E8}
  .na-btn.acc{background:#DC3232;color:#fff;flex:2}.na-btn.acc:hover{background:#C62828}
</style>
</head>

  '</div></div>'}
function cfmFC(id){O=O.map(o=>o.id===id?{...o,s:"cancelled"}:o);clOv();rAll()}

function simNew(){
  const chs=["AIden","Uber Eats","出前館","Wolt","menu"];
  const ts=["delivery","takeout","dine"],t=ts[Math.floor(Math.random()*3)];
  const ch=t==="dine"?"AIden QR":chs[Math.floor(Math.random()*chs.length)];
  const id=String(Math.max(...O.map(o=>parseInt(o.id)))+1).padStart(4,"0");
  const now=new Date(),mm=String(now.getMinutes()).padStart(2,'0');
  const phones=["090-1234-5678","080-5555-9999","070-3333-4444","—"];
  const o={id,s:"new",t,ch,tm:t==="dine"?"—":now.getHours()+":"+String(Math.min(parseInt(mm)+30,59)).padStart(2,'0'),tot:3400,
    phone:phones[Math.floor(Math.random()*phones.length)],
    items:[{n:"黒毛和牛 特上カルビ",q:1,p:2800,op:["焼き加減: ミディアムレア"]},{n:"ガーリックバター",q:3,p:200,op:[]}],
    note:t==="delivery"?"玄関前に置いてください":"",cust:t==="delivery"?"東京都渋谷区神南1-2-3":"",ot:now.getHours()+":"+mm};
  window._po=o;showNA(o)}

function showNA(o){
  const ih=o.items.map(i=>'<div class="p-irow"><div class="p-iname">'+i.n+'</div><div class="p-iqty">×'+i.q+'</div><div class="p-iprice">'+Y(i.p*i.q)+'</div></div>'+(i.op||[]).map(op=>'<div class="p-iopt">└ '+op+'</div>').join("")).join("");
  document.getElementById("ov").innerHTML=
  '<div class="overlay"><div class="na">'+
    '<div class="na-h"><div class="na-ring">🔔</div><div><div class="na-t">新しい注文が入りました</div><div class="na-s">#'+o.id+'</div></div></div>'+
    '<div class="na-b">'+
      '<div class="na-g"><div class="na-box"><div class="na-lbl">種別</div><div class="na-val">'+TI[o.t]+' '+TL[o.t]+'</div></div><div class="na-box"><div class="na-lbl">受渡</div><div class="na-val">'+o.tm+'</div></div><div class="na-box"><div class="na-lbl">合計</div><div class="na-val lg">'+Y(o.tot)+'</div></div></div>'+
      '<div style="border-top:1px solid #EEE;padding-top:12px;margin-bottom:4px"><div class="p-sec-t">注文内容</div>'+ih+'</div>'+
      (o.note?'<div class="p-note"><span class="nl">📝 </span>'+o.note+'</div>':'')+
      (o.t==="delivery"&&o.cust?'<div class="p-note"><span class="nl">📍 </span>'+o.cust+'</div>':'')+
      '<div class="na-acts"><button class="na-btn rej" onclick="rejNA(\''+o.id+'\')">キャンセル</button><button class="na-btn acc" onclick="accNA()">受注する</button></div>'+
    '</div></div></div>'}
function accNA(){const o=window._po;if(o)O.unshift({...o,s:"cooking"});clOv();rAll()}
function rejNA(id){
  const rs=["品切れ","営業時間外","店舗都合","その他"];
  document.getElementById("ov").innerHTML=
  '<div class="overlay"><div class="cpop">'+
    '<div class="cp-t">キャンセル理由</div><div class="cp-s">#'+id+' のキャンセル理由を選択してください</div>'+
    rs.map(r=>'<div class="cr-opt" onclick="cfmRej()">'+r+'</div>').join("")+
    '<div class="cr-note">⚠ キャンセル確定後、お客様に自動通知されます</div>'+
    '<div class="cp-back" onclick="showNA(window._po)">← 戻る</div>'+
  '</div></div>'}
function cfmRej(){const o=window._po;if(o)O.unshift({...o,s:"cancelled"});clOv();rAll()}

function clOv(){document.getElementById("ov").innerHTML=""}
function rAll(){rNav();rHdr();rFlt();rTbl()}
rAll();
document.addEventListener("click",e=>{if(!e.target.closest("#ptgl")&&!e.target.closest("#pmenu"))document.getElementById("pmenu").style.display="none"});
</script>
</body>
</html>
