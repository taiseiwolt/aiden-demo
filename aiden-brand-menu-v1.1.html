<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title data-i18n-title="page_title">メニュー | 炭火亭</title>
<link id="font-link" href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&family=Noto+Serif+JP:wght@400;700&display=swap" rel="stylesheet">
<style>
/* =====================================================
   CSS変数（BRAND_CONFIGから動的設定）
   ===================================================== */
:root {
  --brand-primary:#D32F2F; --brand-primary-dark:#B71C1C; --brand-primary-light:#FFEBEE;
  --brand-header-bg:#D32F2F; --brand-header-text:#FFFFFF;
  --brand-font:'Noto Sans JP',sans-serif; --brand-font-color:#333;
  --text2:#666; --text3:#999; --bg:#fff; --bg2:#F8F8F8; --border:#E0E0E0;
  --shadow:0 2px 8px rgba(0,0,0,.1);
  /* タグカラー（管理画面AIdenカラーリング仕様で変更可） */
  --tag-recommend:#D32F2F;
  --tag-limited:#F57C00;
  --tag-season:#2E7D32;
  --tag-sale:#7B1FA2;
  --tag-rank1:#C9A227;
  --tag-rank2:#78909C;
  --tag-rank3:#8D6E63;
}
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{font-family:var(--brand-font);color:var(--brand-font-color);background:var(--bg);font-size:14px;line-height:1.6}
a{color:inherit;text-decoration:none} button{cursor:pointer} img{max-width:100%}

/* ===== HEADER ===== */
.header{background:var(--brand-header-bg);position:sticky;top:0;z-index:1000}
.header-main{max-width:1100px;margin:0 auto;display:flex;align-items:center;height:56px;padding:0 20px}
.header-logo a{display:flex;align-items:center;gap:10px;margin-right:32px}
.header-logo-mark{width:44px;height:44px;background:white;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0;overflow:hidden}
.header-logo-mark img{width:100%;height:100%;object-fit:cover;border-radius:50%}
.header-logo-text{color:var(--brand-header-text);font-size:20px;font-weight:700;font-family:'Noto Serif JP',serif;white-space:nowrap}
.header-logo-text img{height:32px;object-fit:contain}
.header-nav{display:flex;align-items:center;flex:1}
.header-nav-link{color:var(--brand-header-text);font-size:13px;font-weight:500;padding:0 14px;height:56px;display:flex;align-items:center;white-space:nowrap;transition:background .15s;border:none;background:none;font-family:var(--brand-font);cursor:pointer;text-decoration:none}
.header-nav-link:hover{background:rgba(0,0,0,.15)}
.header-nav-link.cta{background:rgba(0,0,0,.25);border-radius:3px;margin:0 3px;height:38px;font-weight:700;font-size:12px;padding:0 12px}
.header-nav-link.cta:hover{background:rgba(0,0,0,.4)}
.header-nav-link.active{background:rgba(0,0,0,.2);border-bottom:3px solid white}
.lang-select-wrap{margin-left:auto;position:relative;flex-shrink:0}
.lang-select{appearance:none;-webkit-appearance:none;background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.4);color:var(--brand-header-text);font-size:11px;padding:4px 22px 4px 8px;border-radius:3px;cursor:pointer;font-family:var(--brand-font);outline:none}
.lang-select:hover{background:rgba(255,255,255,.25)}
.lang-select option{background:#333;color:#fff}
.lang-select-arrow{position:absolute;right:6px;top:50%;transform:translateY(-50%);pointer-events:none;color:var(--brand-header-text);font-size:9px}
.header-hamburger{display:none;background:none;border:none;color:var(--brand-header-text);font-size:26px;margin-left:auto;padding:8px}
.mobile-nav{display:none;position:fixed;top:56px;left:0;right:0;background:var(--brand-primary-dark, #B71C1C);z-index:999;flex-direction:column;padding:8px 0;box-shadow:0 4px 12px rgba(0,0,0,.3)}
.mobile-nav.open{display:flex}
.mobile-nav a{color:white;font-size:14px;padding:14px 24px;border-bottom:1px solid rgba(255,255,255,.1);display:flex;align-items:center;gap:10px}

/* ===== PAGE HERO ===== */
.page-hero{background:var(--brand-primary);padding:28px 20px;text-align:center;color:white}
.page-hero h1{font-size:28px;font-weight:700;font-family:'Noto Serif JP',serif;letter-spacing:.05em}
.page-hero p{font-size:13px;opacity:.85;margin-top:6px}

/* ===== MENU LAYOUT ===== */
.menu-page{max-width:1060px;margin:0 auto;padding:24px 20px 80px}
.menu-layout{display:grid;grid-template-columns:220px 1fr;gap:24px;align-items:start}

/* カテゴリサイドバー */
.category-sidebar{position:sticky;top:72px;background:white;border:1px solid var(--border);border-radius:6px;overflow:hidden}
.cat-sidebar-title{padding:12px 16px;font-size:12px;font-weight:700;color:var(--text3);letter-spacing:.1em;background:var(--bg2);border-bottom:1px solid var(--border)}
.cat-sidebar-item{display:flex;align-items:center;justify-content:space-between;padding:11px 16px;font-size:13px;border-bottom:1px solid var(--border);cursor:pointer;transition:all .15s;color:var(--brand-font-color);background:none;border-left:none;border-right:none;border-top:none;width:100%;font-family:var(--brand-font);text-align:left}
.cat-sidebar-item:last-child{border-bottom:none}
.cat-sidebar-item:hover{background:var(--brand-primary-light);color:var(--brand-primary)}
.cat-sidebar-item.active{background:var(--brand-primary);color:white;font-weight:700}
.cat-sidebar-item.active:hover{background:var(--brand-primary)}

/* メニューコンテンツ */
.tax-note{font-size:12px;color:var(--text3);margin-bottom:20px}
.menu-category-section{margin-bottom:40px;scroll-margin-top:80px}
.menu-category-header{display:flex;align-items:center;gap:10px;margin-bottom:16px;padding-bottom:10px;border-bottom:2px solid var(--brand-primary)}
.menu-category-header h2{font-size:20px;font-weight:700;font-family:'Noto Serif JP',serif}
.cat-icon{font-size:24px}

/* 商品グリッド */
.menu-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}
.menu-card{border:1px solid var(--border);border-radius:6px;overflow:hidden;cursor:pointer;transition:all .2s;background:white}
.menu-card:hover{border-color:var(--brand-primary);box-shadow:0 4px 16px rgba(0,0,0,.12);transform:translateY(-2px)}
.menu-card-img{width:100%;aspect-ratio:4/3;display:flex;align-items:center;justify-content:center;font-size:52px;position:relative}
.menu-card-body{padding:10px 12px 12px}
.menu-card-tags{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:6px;min-height:0}
/* タグ */
.menu-tag{display:inline-block;font-size:10px;font-weight:700;padding:2px 7px;border-radius:2px;color:white}
.tag-recommend{background:var(--tag-recommend)}
.tag-limited{background:var(--tag-limited)}
.tag-season{background:var(--tag-season)}
.tag-sale{background:var(--tag-sale)}
.tag-rank1{background:var(--tag-rank1)}
.tag-rank2{background:var(--tag-rank2)}
.tag-rank3{background:var(--tag-rank3)}
/* 価格表示 */
.menu-card-name{font-size:13px;font-weight:700;line-height:1.4;margin-bottom:4px}
.menu-card-desc{font-size:11px;color:var(--text2);line-height:1.5;margin-bottom:6px}
.menu-card-price{font-size:15px;font-weight:700;color:var(--brand-primary)}
.menu-card-price .original{font-size:12px;color:var(--text3);text-decoration:line-through;margin-right:4px;font-weight:400}
.menu-card-price .unit{font-size:11px;font-weight:400;color:var(--text3)}

/* ===== 商品詳細ポップアップ ===== */
.item-modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:2000;align-items:center;justify-content:center;padding:20px}
.item-modal-overlay.open{display:flex}
.item-modal{background:white;border-radius:10px;width:100%;max-width:540px;max-height:90vh;overflow-y:auto;box-shadow:0 8px 40px rgba(0,0,0,.25);animation:modalIn .2s ease}
@keyframes modalIn{from{opacity:0;transform:scale(.95)}to{opacity:1;transform:scale(1)}}
.item-modal-img{width:100%;aspect-ratio:4/3;display:flex;align-items:center;justify-content:center;font-size:80px;border-radius:10px 10px 0 0}
.item-modal-body{padding:20px 24px 28px}
.item-modal-tags{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:10px}
.item-modal-name{font-size:20px;font-weight:700;line-height:1.4;margin-bottom:6px;font-family:'Noto Serif JP',serif}
.item-modal-outline{font-size:13px;color:var(--text2);margin-bottom:12px;line-height:1.6}
.item-modal-desc{font-size:13px;line-height:1.7;margin-bottom:16px;padding:12px;background:var(--bg2);border-radius:4px;border-left:3px solid var(--brand-primary)}
.item-modal-price{font-size:22px;font-weight:700;color:var(--brand-primary);margin-bottom:12px}
.item-modal-price .original{font-size:15px;color:var(--text3);text-decoration:line-through;margin-right:6px;font-weight:400}
.item-modal-price .unit{font-size:13px;font-weight:400;color:var(--text3)}
.item-modal-allergen{font-size:12px;color:var(--text3);padding:10px 12px;border:1px solid var(--border);border-radius:4px;line-height:1.6}
.item-modal-allergen strong{color:var(--text2)}
.item-modal-close{position:absolute;top:12px;right:12px;background:rgba(0,0,0,.4);color:white;border:none;border-radius:50%;width:32px;height:32px;font-size:16px;display:flex;align-items:center;justify-content:center;z-index:10}
.item-modal-close:hover{background:rgba(0,0,0,.6)}
.item-modal-wrap{position:relative}

/* ===== RESPONSIVE ===== */
@media(max-width:800px){
  .menu-layout{grid-template-columns:1fr}
  .category-sidebar{position:static;display:flex;overflow-x:auto;border-radius:4px}
  .cat-sidebar-title{display:none}
  .cat-sidebar-item{flex-shrink:0;border-bottom:none;border-right:1px solid var(--border);padding:10px 14px;width:auto}
  .menu-grid{grid-template-columns:repeat(2,1fr)}
  .header-nav{display:none}.header-hamburger{display:block}
}
@media(max-width:480px){.menu-grid{grid-template-columns:1fr}}
</style>
</head>

var currentLang = 'ja';

/* =====================================================
   ユーティリティ
   ===================================================== */
function t(key) {
  return (I18N[currentLang] && I18N[currentLang][key]) ? I18N[currentLang][key] : (I18N['ja'][key] || key);
}

/* 割引後価格を計算 */
function calcDiscountedPrice(price, discount) {
  if (!discount) return null;
  if (discount.type === 'fixed')   return Math.max(0, price - discount.amount);
  if (discount.type === 'percent') return Math.round(price * (1 - discount.rate / 100));
  return null;
}

/* タグHTML生成 */
function buildTagsHtml(tags, discount) {
  var allTags = tags ? tags.slice() : [];
  if (discount) allTags.unshift('sale');
  return allTags.map(function(tag) {
    return '<span class="menu-tag tag-' + tag + '">' + t('tag_' + tag) + '</span>';
  }).join('');
}

/* 価格HTML生成 */
function buildPriceHtml(item, forModal) {
  var discounted = calcDiscountedPrice(item.price, item.discount);
  var unit = item.priceUnit ? '<span class="unit">' + item.priceUnit + '</span>' : '<span class="unit">' + t('price_unit_tax') + '</span>';
  if (discounted !== null) {
    var orig = item.price.toLocaleString();
    var disc = discounted.toLocaleString();
    return '<span class="original">' + orig + '円</span>' + disc + '円' + unit;
  } else {
    return item.price.toLocaleString() + '円' + unit;
  }
}

/* アレルギーHTML生成 */
function buildAllergenHtml(allergens) {
  var label = t('allergen_label');
  var content = (allergens && allergens.length > 0) ? allergens.join('・') : t('allergen_none');
  return '<div class="item-modal-allergen"><strong>' + label + '：</strong>' + content + '</div>';
}

/* =====================================================
   BUILD MENU
   ===================================================== */
function buildMenu() {
  // カテゴリをorder順にソート
  var cats = MENU_DATA.slice().sort(function(a,b){ return a.order - b.order; });
  var sidebar = document.getElementById('category-sidebar');
  var content = document.getElementById('menu-content');

  var sideHtml = '<div class="cat-sidebar-title">' + t('cat_label') + '</div>';
  var mainHtml = '<p class="tax-note" data-i18n="tax_note">' + t('tax_note') + '</p>';

  cats.forEach(function(cat, ci) {
    sideHtml += '<button class="cat-sidebar-item' + (ci===0?' active':'') + '" '
      + 'onclick="scrollToCategory(\'' + cat.id + '\')" id="cat-btn-' + cat.id + '">'
      + cat.icon + ' ' + cat.label + '</button>';

    mainHtml += '<section class="menu-category-section" id="cat-' + cat.id + '">';
    mainHtml += '<div class="menu-category-header"><span class="cat-icon">' + cat.icon + '</span><h2>' + cat.label + '</h2></div>';
    mainHtml += '<div class="menu-grid">';

    cat.items.forEach(function(item, idx) {
      var tagsHtml = buildTagsHtml(item.tags, item.discount);
      var priceHtml = buildPriceHtml(item);
      mainHtml += '<div class="menu-card" onclick="openItemModal(\'' + cat.id + '\',' + idx + ')">'
        + '<div class="menu-card-img" style="background:' + item.bg + '">' + item.emoji + '</div>'
        + '<div class="menu-card-body">'
        + '<div class="menu-card-tags">' + tagsHtml + '</div>'
        + '<div class="menu-card-name">' + item.name + '</div>'
        + '<div class="menu-card-desc">' + item.outline + '</div>'
        + '<div class="menu-card-price">' + priceHtml + '</div>'
        + '</div></div>';
    });

    mainHtml += '</div></section>';
  });

  sidebar.innerHTML = sideHtml;
  content.innerHTML = mainHtml;
}

/* =====================================================
   MODAL
   ===================================================== */
function openItemModal(catId, itemIdx) {
  var cat = MENU_DATA.find(function(c){ return c.id === catId; });
  if (!cat) return;
  var item = cat.items[itemIdx];
  var tagsHtml = buildTagsHtml(item.tags, item.discount);
  var priceHtml = buildPriceHtml(item, true);
  var allergenHtml = buildAllergenHtml(item.allergens);
  var courseNote = item.isCourse
    ? '<p style="font-size:12px;color:var(--text3);margin-top:10px">'
      + t('reserve_note') + ' <a href="./aiden-store-v5.html" style="color:var(--brand-primary)">' + t('reserve_link') + '</a></p>'
    : '';

  document.getElementById('item-modal-inner').innerHTML =
    '<div class="item-modal-img" style="background:' + item.bg + '">' + item.emoji + '</div>'
    + '<div class="item-modal-body">'
    + '<div class="item-modal-tags">' + tagsHtml + '</div>'
    + '<div class="item-modal-name">' + item.name + '</div>'
    + '<div class="item-modal-outline">' + item.outline + '</div>'
    + '<div class="item-modal-desc">' + (item.detail || item.outline) + '</div>'
    + '<div class="item-modal-price">' + priceHtml + '</div>'
    + allergenHtml
    + courseNote
    + '</div>';

  document.getElementById('item-modal').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeItemModal(e) {
  if (e && e.target !== document.getElementById('item-modal')) return;
  document.getElementById('item-modal').classList.remove('open');
  document.body.style.overflow = '';
}

/* =====================================================
   SCROLL & ACTIVE
   ===================================================== */
function scrollToCategory(id) {
  var el = document.getElementById('cat-' + id);
  if (!el) return;
  var offset = 80; // ヘッダー高さ + 余白
  var top = el.getBoundingClientRect().top + window.scrollY - offset;
  window.scrollTo({ top: top, behavior: 'smooth' });
  setActiveBtn(id);
}

function setActiveBtn(id) {
  document.querySelectorAll('.cat-sidebar-item').forEach(function(b){ b.classList.remove('active'); });
  var btn = document.getElementById('cat-btn-' + id);
  if (btn) btn.classList.add('active');
}

window.addEventListener('scroll', function() {
  var scroll = window.scrollY + 100;
  var cats = MENU_DATA.slice().sort(function(a,b){ return a.order - b.order; });
  cats.forEach(function(cat) {
    var el = document.getElementById('cat-' + cat.id);
    if (el && el.offsetTop <= scroll && el.offsetTop + el.offsetHeight > scroll) {
      setActiveBtn(cat.id);
    }
  });
});

/* =====================================================
   i18n
   ===================================================== */
function changeLang(lang) {
  if (!I18N[lang]) return;
  currentLang = lang;
  document.querySelectorAll('[data-i18n]').forEach(function(el) {
    var key = el.getAttribute('data-i18n');
    if (I18N[lang][key] !== undefined) el.innerHTML = I18N[lang][key];
  });
  document.getElementById('html-root').lang = lang;
  // メニューを再描画（タグ名・説明文の言語が変わる）
  buildMenu();
}

/* =====================================================
   BRAND CONFIG 適用
   ===================================================== */
function applyBrand() {
  var c = BRAND_CONFIG, r = document.documentElement;
  r.style.setProperty('--brand-primary',      c.primaryColor);
  r.style.setProperty('--brand-primary-dark',  c.primaryDark);
  r.style.setProperty('--brand-primary-light', c.primaryLight);
  r.style.setProperty('--brand-header-bg',     c.headerBg);
  r.style.setProperty('--brand-header-text',   c.headerTextColor);
  r.style.setProperty('--brand-font-color',    c.fontColor);
  r.style.setProperty('--brand-font', "'" + c.fontFamily + "',sans-serif");
  // タグカラー
  if (c.tagColors) {
    Object.keys(c.tagColors).forEach(function(k) {
      r.style.setProperty('--tag-' + k, c.tagColors[k]);
    });
  }
  // ロゴマーク
  var mark = document.getElementById('logo-mark');
  if (c.logoMarkType === 'image' && c.logoMarkSrc) {
    mark.innerHTML = '<img src="' + c.logoMarkSrc + '" alt="logo">';
  } else {
    mark.textContent = c.logoMarkEmoji;
  }
  // ロゴテキスト
  var txt = document.getElementById('logo-text');
  if (c.logoTextType === 'image' && c.logoTextValue) {
    txt.innerHTML = '<img src="' + c.logoTextValue + '" alt="' + c.name + '">';
  } else {
    txt.textContent = c.logoTextValue;
  }
}

   NAV

function toggleNav() {
  document.getElementById('mobile-nav').classList.toggle('open');
  document.getElementById('hamburger').textContent =
    document.getElementById('mobile-nav').classList.contains('open') ? '✕' : '☰';
}
document.addEventListener('click', function(e) {
  if (!e.target.closest('#mobile-nav') && !e.target.closest('#hamburger')) {
    var nav = document.getElementById('mobile-nav');
    if (nav) nav.classList.remove('open');
    document.getElementById('hamburger').textContent = '☰';
  }
});

document.addEventListener('DOMContentLoaded', function() {
  applyBrand();
  buildMenu();
});
</script>
</body>
</html>
